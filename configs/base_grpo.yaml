# Base hyperparameters shared across all 16 GRPO runs.
# Scripts read this file and pass each entry as a key=value CLI override to:
#   python3 -m verl.trainer.main_ppo <key>=<value> ...
#
# Per-run overrides (actor_rollout_ref.model.path, data.train_files,
# trainer.experiment_name, trainer.default_local_dir) are appended by
# scripts/04_train_grpo.py.

# ── Algorithm ────────────────────────────────────────────────────────────────
algorithm.adv_estimator: grpo
algorithm.use_kl_in_reward: False

# ── KL control (actor-side loss) ─────────────────────────────────────────────
actor_rollout_ref.actor.use_kl_loss: True
actor_rollout_ref.actor.kl_loss_coef: 0.001
actor_rollout_ref.actor.kl_loss_type: low_var_kl
actor_rollout_ref.actor.entropy_coeff: 0

# ── Data ────────────────────────────────────────────────────────────────────
# Checkpoints go to /home/usemil/orcd/scratch/sft_grpo_experiment/checkpoints/grpo/<sft>/<grpo>
# (set per-run by scripts/04_train_grpo.py via trainer.default_local_dir)
data.val_files: /home/usemil/orcd/scratch/sft_grpo_experiment/data/gsm8k_test.parquet
data.train_batch_size: 128
data.max_prompt_length: 512
data.max_response_length: 1024
data.filter_overlong_prompts: True
data.truncation: error
data.shuffle: False

# ── Model ────────────────────────────────────────────────────────────────────
# actor_rollout_ref.model.path is set per-run
actor_rollout_ref.model.use_remove_padding: True
actor_rollout_ref.model.enable_gradient_checkpointing: True

# LoRA (disabled by default – full fine-tune of 0.5B fits on one A100)
actor_rollout_ref.model.lora_rank: 64
actor_rollout_ref.model.lora_alpha: 32

# ── Actor ────────────────────────────────────────────────────────────────────
actor_rollout_ref.actor.strategy: fsdp
actor_rollout_ref.actor.optim.lr: 5e-6
actor_rollout_ref.actor.ppo_mini_batch_size: 64
actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu: 16
actor_rollout_ref.actor.fsdp_config.param_offload: False
actor_rollout_ref.actor.fsdp_config.optimizer_offload: False

# ── Rollout (vLLM) ───────────────────────────────────────────────────────────
actor_rollout_ref.rollout.name: vllm
actor_rollout_ref.rollout.n: 5
actor_rollout_ref.rollout.gpu_memory_utilization: 0.6
actor_rollout_ref.rollout.tensor_model_parallel_size: 1
actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu: 16
actor_rollout_ref.rollout.load_format: safetensors
actor_rollout_ref.rollout.enforce_eager: True
actor_rollout_ref.rollout.layered_summon: True

# ── Reference model ───────────────────────────────────────────────────────────
actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu: 16
actor_rollout_ref.ref.fsdp_config.param_offload: True

# ── Trainer ──────────────────────────────────────────────────────────────────
trainer.total_epochs: 1
trainer.critic_warmup: 0
trainer.val_before_train: False
trainer.project_name: gsm8k_grpo_selection
trainer.logger: '["console"]'
trainer.n_gpus_per_node: 1
trainer.nnodes: 1
trainer.save_freq: -1
trainer.test_freq: 20
