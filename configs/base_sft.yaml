# SFT training hyperparameters — loaded by scripts/02_train_sft.py via OmegaConf.
#
# CLI dotlist overrides are supported at launch time, e.g.:
#   python3 scripts/02_train_sft.py training.lr=1e-4 eval.gen_batch_size=16

model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  max_seq_length: 1024

training:
  max_steps: 50
  eval_steps: 10
  save_steps: 10
  early_stopping_patience: 3
  # Batch size: per_device × gradient_accumulation × n_gpus = 4 × 32 × 1 = 128
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 32
  lr: 2.0e-5
  lr_scheduler: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0

eval:
  gen_batch_size: 16
  max_new_tokens: 512

lora:
  rank: 0           # 0 = full fine-tune; >0 = LoRA (saves adapter only)
  alpha: 16
  target_modules: all-linear
